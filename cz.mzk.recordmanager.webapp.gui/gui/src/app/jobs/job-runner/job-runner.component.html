<div *ngIf="needId">
  <select [(ngModel)]="selectedConfigs" class="selectpicker" multiple data-selected-text-format="count > 2" data-live-search="true">

    <option *ngFor="let conf of importConfigs" value="{{conf.id}}">{{conf.id}} {{conf.idPrefix}} {{conf.library.name}}</option>

  </select>
</div>
<br>

<button (click)="runJob()" type="button" class="btn btn-primary">Run</button>
