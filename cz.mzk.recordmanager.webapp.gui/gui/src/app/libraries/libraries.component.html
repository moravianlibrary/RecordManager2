<main>

  <div>

    <div *ngIf="loading" id="circlePreloader" class="preloader-wrapper big active">
      <div class="spinner-layer spinner-red-only">
        <div class="circle-clipper left">
          <div class="circle"></div>
        </div><div class="gap-patch">
        <div class="circle"></div>
      </div><div class="circle-clipper right">
        <div class="circle"></div>
      </div>
      </div>
    </div>


    <h4 class="truncate center">Libraries</h4>

    <table class="bordered">
      <thead>
      <tr>

        <th data-field="id"><a class="waves-effect btn-flat waves-red" (click)="sortByMe('id')">id<i  class="tiny material-icons" [ngClass]="[getArrow('id'), getVisibility('id')]">keyboard_arrow_down</i></a></th>

        <th data-field="name"><a class="waves-effect btn-flat waves-red" (click)="sortByMe('name')">Name<i  class="tiny material-icons" [ngClass]="[getArrow('name'), getVisibility('name')]" >keyboard_arrow_down</i></a></th>

        <th data-field="city"><a class="waves-effect btn-flat waves-red" (click)="sortByMe('city')">City<i  class="tiny material-icons" [ngClass]="[getArrow('city'), getVisibility('city')]" >keyboard_arrow_down</i></a></th>

        <th data-field="url"><a class="waves-effect btn-flat waves-red" (click)="sortByMe('url')">url<i  class="tiny material-icons" [ngClass]="[getArrow('url'), getVisibility('url')]" >keyboard_arrow_down</i></a></th>

        <th data-field="catalogUrl"><a class="waves-effect btn-flat waves-red" (click)="sortByMe('catalogUrl')">Catalog URL<i  class="tiny material-icons" [ngClass]="[getArrow('catalogUrl'), getVisibility('catalogUrl')]" >keyboard_arrow_down</i></a></th>

        <th data-field="details">DETAILS</th>

      </tr>
      </thead>

      <tbody *ngFor="let library of libraries | orderBy: [sortBy]">
        <tr>
          <td>{{library.id}}</td>
          <td>{{library.name}}</td>
          <td>{{library.city}}</td>
          <td><a [href]="'http://' + library.url" target="_blank">{{library?.url}}</a></td>
          <td><a [href]="'http://' + library.catalogUrl" target="_blank">{{library?.catalogUrl}}</a></td>
          <td><a [routerLink]="['/library', library.id]"><i class="material-icons">send</i></a></td>
        </tr>
      </tbody>
    </table>

  </div>



  <a class="btn-floating btn-large waves-effect waves-light red waves-effect waves-light btn modal-trigger" id="addLibraryBtn" href="#add-library-modal"><i class="material-icons">add</i></a>


  <div id="add-library-modal" class="modal">
    <div class="modal-content">

      <div class="row">
        <form class="col s12">

          <div class="row">
            <div class="input-field col s12">
              <input id="name" type="text" [(ngModel)]="newLibrary.name" name="libraryName">
              <label for="name">Name</label>
            </div>
          </div>

          <div class="row">
            <div class="input-field col s12">
              <input id="url" type="url"  [(ngModel)]="newLibrary.url" name="libraryURL">
              <label for="url">URL</label>
            </div>
          </div>

          <div class="row">
            <div class="input-field col s12">
              <input id="catalogUrl" type="url"  [(ngModel)]="newLibrary.catalogUrl" name="libraryCatalogURL">
              <label for="catalogUrl">Catalog URL</label>
            </div>
          </div>

          <div class="row">
            <div class="input-field col s12">
              <input id="city" type="text"  [(ngModel)]="newLibrary.city" name="libraryCity">
              <label for="city">City</label>
            </div>
          </div>

          <button class="btn waves-effect waves-light" type="submit" id="createNewLibrary" name="action" (click)="createLibrary()">Submit
            <i class="material-icons right">send</i>
          </button>
        </form>
      </div>

    </div>

  </div>
</main>
