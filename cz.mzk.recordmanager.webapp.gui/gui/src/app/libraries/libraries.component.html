<div>
  <div *ngIf="loading" class="progress red lighten-3" >
    <div class="indeterminate"></div>
  </div>
  <h4 class="truncate center">Libraries</h4>

  <ul class="collection" *ngFor="let library of libraries">
    <div class="row">
      <div class="col s12 m6">
        <div class="card blue-grey darken-1">
          <div class="card-content white-text">
            <span class="card-title">{{library?.name}}</span>
            <br>
            {{library?.id}}
            <br>
            {{library?.city}}
          </div>
          <div class="card-action">
            <a [href]="'http://' + library.url" target="_blank">{{library?.url}}</a>
            <a [href]="'http://' + library.catalogUrl" target="_blank">{{library?.catalogUrl}}</a>
            <a [routerLink]="['/library', library.id]">Details</a>
          </div>
        </div>
      </div>
    </div>
  </ul>

</div>
<a class="btn-floating btn-large waves-effect waves-light red waves-effect waves-light btn modal-trigger" id="addLibraryBtn"><i class="material-icons">add</i></a>


<!-- Modal Structure -->
<div id="modal1" class="modal bottom-sheet">
  <div class="modal-content">
    <h4>Modal Header</h4>
    <p>A bunch of text</p>
  </div>
  <div class="modal-footer">
    <a href="#!" class=" modal-action modal-close waves-effect waves-green btn-flat">Agree</a>
  </div>
</div>

<script>
  jQuery( document ).ready( function( ) {
    console.log( 'jQuery document ready' );
    jQuery( '#addLibraryBtn' ).click( function( event ) {
      console.log( 'Button clicked' );
      event.preventDefault();
      jQuery('.modal-trigger').leanModal();
      jQuery( '#modal1' ).openModal();
    });
  });
</script>
