<div class="page-header">
  <h1>Library {{library.name}}</h1>
</div>

<form>

  <div class="form-group">
    <label for="id" class="control-label">ID:</label>
    <input type="number" [(ngModel)]="library.id" name="libraryId" class="form-control" id="id" [value]="library.id" disabled>
  </div>

  <div class="form-group">
    <label for="name" class="control-label">Name:</label>
    <input type="text" [(ngModel)]="library.name" name="libraryName" class="form-control" id="name" [value]="library.name">
  </div>

  <div class="form-group">
    <label for="url" class="control-label">URL:</label>
    <input type="url"  [(ngModel)]="library.url" name="libraryURL" class="form-control" id="url" [value]="library.url">
  </div>

  <div class="form-group">
    <label for="catalorUrl" class="control-label">Catalog URL:</label>
    <input type="url"  [(ngModel)]="library.catalogUrl" name="libraryCatalogURL" class="form-control" id="catalorUrl" [value]="library.catalogUrl">
  </div>

  <div class="form-group">
    <label for="catalorUrl" class="control-label">City:</label>
    <input type="text"  [(ngModel)]="library.city" name="libraryCity" class="form-control" id="city" [value]="library.city">
  </div>

  <button type="button" class="btn btn-primary saveBtn" (click)="updateLibrary()">Save</button>

</form>



<div class="panel-group" id="accordion">


  <div *ngFor="let conf of libraryDetail?.oaiHarvestConfigurations" class="panel panel-default">
    <div class="panel-heading">
      <h4 class="panel-title">
        <a (click)="selectMe(conf.id)" data-toggle="collapse" data-parent="#accordion" href="#collapse{{conf.id}}">Harvest: {{conf.id}} {{conf.idPrefix}}</a>
      </h4>
    </div>
    <div id="collapse{{conf.id}}" class="panel-collapse collapse">
      <div class="panel-body">

        <form>

          <h3>Harvest configuration:</h3>

          <div class="row">
            <div class="form-group col-md-6">
              <label for="harvestId" class="control-label">ID:</label>
              <input type="number" [(ngModel)]="selected.id" name="harvestId" class="form-control" id="harvestId" [value]="selected.id" disabled>
            </div>

            <div class="form-group col-md-6">
              <label for="harvestUrl" class="control-label">URL:</label>
              <input type="url" [(ngModel)]="selected.url" name="harvestUrl" class="form-control" id="harvestUrl" [value]="selected.url">
            </div>

          </div>


          <div class="row">
            <div class="form-group col-md-6">
              <label for="harvestId" class="control-label">Set:</label>
              <input type="text" [(ngModel)]="selected.set" name="harvestSet" class="form-control" id="harvestSet" [value]="selected.set" >
            </div>

            <div class="form-group col-md-6">
              <label for="harvestUrl" class="control-label">Metadata prefix:</label>
              <input type="text" [(ngModel)]="selected.metadataPrefix" name="harvestMetadataPrefix" class="form-control" id="harvestMetadataPrefix" [value]="selected.metadataPrefix">
            </div>

          </div>



          <div class="row">
            <div class="form-group col-md-6">
              <label for="harvestId" class="control-label">ID prefix:</label>
              <input type="text" [(ngModel)]="selected.idPrefix" name="harvestIdPrefix" class="form-control" id="harvestIdPrefix" [value]="selected.idPrefix" >
            </div>

            <div class="form-group col-md-6">
              <label for="harvestUrl" class="control-label">Base weight:</label>
              <input type="text" [(ngModel)]="selected.baseWeight" name="harvestBaseWeight" class="form-control" id="harvestBaseWeight" [value]="selected.baseWeight">
            </div>

          </div>


          <div class="row">
            <div class="form-group col-md-6">
              <label for="harvestId" class="control-label">Cluster ID enabled:</label>
              <input type="text" [(ngModel)]="selected.clusterIdEnabled" name="harvestCluestrIdEnabled" class="form-control" id="harvestCluestrIdEnabled" [value]="selected.clusterIdEnabled" >
            </div>

            <div class="form-group col-md-6">
              <label for="harvestUrl" class="control-label">Filtering enabled:</label>
              <input type="text" [(ngModel)]="selected.filteringEnabled" name="harvestFilteringEnabled" class="form-control" id="harvestFilteringEnabled" [value]="selected.filteringEnabled">
            </div>

          </div>

          <div class="row">
            <div class="form-group col-md-6">
              <label for="harvestId" class="control-label">Interception enabled:</label>
              <input type="text" [(ngModel)]="selected.interceptionEnabled" name="harvestInterceptionEnabled" class="form-control" id="harvestInterceptionEnabled" [value]="selected.interceptionEnabled" >
            </div>

            <div class="form-group col-md-6">
              <label for="harvestUrl" class="control-label">Extract ID prefix:</label>
              <input type="text" [(ngModel)]="selected.extractIdRegex" name="harvestExtractIdPrefix" class="form-control" id="harvestExtractIdPrefix" [value]="selected.extractIdRegex">
            </div>

          </div>


          <div class="row">
            <div class="form-group col-md-6">
              <label for="harvestId" class="control-label">Harvest job name:</label>
              <input type="text" [(ngModel)]="selected.harvestJobName" name="harvestJobName" class="form-control" id="harvestJobName" [value]="selected.harvestJobName" >
            </div>

            <div class="form-group col-md-6">
              <label for="harvestUrl" class="control-label">Is library:</label>
              <input type="text" [(ngModel)]="selected.library" name="harvestLibrary" class="form-control" id="harvestLibrary" [value]="selected.library">
            </div>

          </div>

          <h3>Contact person:</h3>

          <div class="row">
            <div class="form-group col-md-6">
              <label for="contactId" class="control-label">Contact ID:</label>
              <input type="number" [(ngModel)]="selected.contact.id" name="harvestJobName" class="form-control" id="contactId" [value]="selected.contact.id" disabled>
            </div>

            <div class="form-group col-md-6">
              <label for="harvestUrl" class="control-label">Name:</label>
              <input type="text" [(ngModel)]="selected.contact.name" name="contactName" class="form-control" id="contactName" [value]="selected.contact.name">
            </div>

          </div>

          <div class="row">
            <div class="form-group col-md-6">
              <label for="contactId" class="control-label">Email:</label>
              <input type="email" [(ngModel)]="selected.contact.email" name="contactEmail" class="form-control" id="contactEmail" [value]="selected.contact.email">
            </div>

            <div class="form-group col-md-6">
              <label for="harvestUrl" class="control-label">Phone:</label>
              <input type="text" [(ngModel)]="selected.contact.phone" name="contactPhone" class="form-control" id="contactPhone" [value]="selected.contact.phone">
            </div>

          </div>

          <button type="button" class="btn btn-primary saveBtn" (click)="updateConfiguration(library.id)">Save</button>

        </form>

      </div>
    </div>
  </div>

</div>
