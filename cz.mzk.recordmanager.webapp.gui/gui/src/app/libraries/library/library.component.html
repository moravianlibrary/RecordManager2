<h1>{{libraryDetail?.oaiHarvestConfigurations[0].contactPerson.name}}</h1>

<h4 class="center-align">Knihovna - {{libraryDetail?.name}}</h4>
<h5 class="center-align">{{libraryDetail?.id}}</h5>

<div class="row">
  <form class="col s12">

    <div class="row">
      <div class="input-field col s6">
        <input placeholder="Name" value="{{libraryDetail?.name}}" type="text" class="validate">
      </div>
    </div>

    <div class="row">
      <div class="input-field col s6">
        <input placeholder="URL" value="{{libraryDetail?.url}}" type="url" class="validate">
      </div>
    </div>

    <div class="row">
      <div class="input-field col s6">
        <input placeholder="Catalog URL" value="{{libraryDetail?.catalogUrl}}" type="url" class="validate">
      </div>
    </div>

    <div class="row">
      <div class="input-field col s6">
        <input placeholder="City" value="{{libraryDetail?.city}}" type="text" class="validate">
      </div>
    </div>


  </form>
</div>
