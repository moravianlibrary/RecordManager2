<div class="page-header">
  <h1>Library {{library.name}}</h1>
</div>

<form>

  <div class="form-group">
    <label for="id" class="control-label">ID:</label>
    <input type="number" [(ngModel)]="library.id" name="libraryId" class="form-control" id="id" [value]="library.id" disabled>
  </div>

  <div class="form-group">
    <label for="name" class="control-label">Name:</label>
    <input type="text" [(ngModel)]="library.name" name="libraryName" class="form-control" id="name" [value]="library.name">
  </div>

  <div class="form-group">
    <label for="url" class="control-label">URL:</label>
    <input type="url"  [(ngModel)]="library.url" name="libraryURL" class="form-control" id="url" [value]="library.url">
  </div>

  <div class="form-group">
    <label for="catalorUrl" class="control-label">Catalog URL:</label>
    <input type="url"  [(ngModel)]="library.catalogUrl" name="libraryCatalogURL" class="form-control" id="catalorUrl" [value]="library.catalogUrl">
  </div>

  <div class="form-group">
    <label for="catalorUrl" class="control-label">City:</label>
    <input type="text"  [(ngModel)]="library.city" name="libraryCity" class="form-control" id="city" [value]="library.city">
  </div>

  <button type="button" class="btn btn-danger" (click)="removeLibrary()"><i class="glyphicon glyphicon-trash"></i> Delete</button>
  <button type="button" class="btn btn-primary saveBtn" (click)="updateLibrary()"><i class="glyphicon glyphicon-floppy-save"></i> Save</button>

</form>

<br>

<div class="panel-group" id="accordion">

  <div *ngFor="let conf of libraryDetail?.oaiHarvestConfigurations" class="panel panel-default">
    <div class="panel-heading">
      <h4 class="panel-title">
        <a (click)="selectMe(conf.id)" data-toggle="collapse" data-parent="#accordion" href="#collapse{{conf.id}}">Harvest: {{conf.id}} {{conf.idPrefix}}</a>
      </h4>
    </div>
    <div id="collapse{{conf.id}}" class="panel-collapse collapse">
      <div class="panel-body">
        <form>

          <h3>Configuration: </h3>

          <div  *ngFor="let key of selected | keyExtractor">

            <div class="form-group col-md-12" *ngIf="key.toLowerCase() == 'id'">
              <label class="control-label">{{key}}:</label>
              <input type="text" #field name="harvestId" class="form-control" [value]="selected[key]" disabled>
            </div>

            <div class="form-group col-md-12" *ngIf="key.toLowerCase() == 'configurationtype'">
              <label class="control-label">{{key}}:</label>
              <input type="text"  name="harvestId" class="form-control" [value]="selected[key]" disabled>
            </div>

            <div class="form-group col-md-12" *ngIf="key.toLowerCase() != 'configurationtype' && key.toLowerCase() != 'id' && key.toLowerCase() != 'contact' && key.toLowerCase() != 'library'">
              <label class="control-label">{{key}}:</label>
              <input type="text" #field (input)="changeConfig(field, key)"  name="harvestId" class="form-control" [value]="selected[key]">
            </div>
          </div>


          <h3>Contact:</h3>

          <div *ngFor="let contactField of selected?.contact | keyExtractor">

            <div class="form-group col-md-12" *ngIf="contactField.toLowerCase() == 'id'">
              <label class="control-label">{{contactField}}:</label>
              <input type="text" name="harvestId" class="form-control" [value]="selected?.contact[contactField]" disabled>
            </div>

            <div class="form-group col-md-12" *ngIf="contactField.toLowerCase() != 'id'">
              <label class="control-label">{{contactField}}:</label>
              <input type="text" #field (input)="changeContact(field, contactField)"  name="harvestId" class="form-control" [value]="selected?.contact[contactField]">
            </div>

          </div>

          <button type="button" class="btn btn-danger" (click)="removeLibrary()"><i class="glyphicon glyphicon-trash"></i> Delete</button>
          <button type="button" class="btn btn-primary saveBtn" (click)="updateConfiguration(library?.id, selected?.configurationType)"><i class="glyphicon glyphicon-floppy-save"></i> Save</button>

        </form>

      </div>
    </div>
  </div>

</div>
